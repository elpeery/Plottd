[build]
  functions = "netlify/functions"

[functions."generate-part1"]
  timeout = 26

[functions."generate-part2"]
  timeout = 26

[functions."generate-part3"]
  timeout = 26

[[redirects]]
  from = "/api/generate-part1"
  to = "/.netlify/functions/generate-part1"
  status = 200

[[redirects]]
  from = "/api/generate-part2"
  to = "/.netlify/functions/generate-part2"
  status = 200

[[redirects]]
  from = "/api/generate-part3"
  to = "/.netlify/functions/generate-part3"
  status = 200
